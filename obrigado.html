<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; color: white; background-color: #020617; overflow-x: hidden; }
        .bg-tech-dark {
            background-image: radial-gradient(circle at bottom left, rgba(163, 230, 53, 0.05), transparent),
                              linear-gradient(to bottom, #020617, #0f172a);
        }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .brand-text { color: #a3e635; }
        .cta-button-brand {

            transition: all 0.3s; 
            box-shadow: 0 10px 20px -10px rgba(163, 230, 53, 0.5); 
        }
        
        /* Animação de Check */
        .check-icon {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
